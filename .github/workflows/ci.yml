name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      # The suite is hermetic: no ANTHROPIC_API_KEY is set anywhere in CI,
      # so a test that reaches for the network or a real client fails here.
      - name: Test
        run: pytest

  demo-smoke:
    # The offline provider demo is the end-to-end path a consumer runs first;
    # it must work from a clean install with no API key.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e .
      - name: Run provider demo
        run: python -m examples.provider_demo
