# Gold dataset for the translate accuracy benchmark.
# Source plan: Humana Gold Plus H1036-217 (HMO), 2025 — see fixtures/provenance.md.
# Every answer is verified against the fixture text. `answerable: false` cases
# ask about benefits deliberately absent from the fixture (the agent must abstain).

# ---- Answerable ----
- id: monthly-premium
  doc: humana-gold-plus-h1036-217
  question: "What is the monthly plan premium?"
  answerable: true
  expect_facts:
    amounts: [0]
  gold_answer: "The monthly plan premium is $0. You still pay your Medicare Part B premium."

- id: medical-deductible
  doc: humana-gold-plus-h1036-217
  question: "Does this plan have a medical deductible?"
  answerable: true
  gold_answer: "No. This plan does not have a medical deductible."

- id: max-out-of-pocket
  doc: humana-gold-plus-h1036-217
  question: "What is the most I could pay out of pocket in a year for in-network care?"
  answerable: true
  expect_facts:
    amounts: [4150]
  gold_answer: "Your in-network maximum out-of-pocket is $4,150 per calendar year."

- id: er-copay-admitted
  doc: humana-gold-plus-h1036-217
  question: "What's my ER copay, and is it waived if I'm admitted?"
  answerable: true
  expect_facts:
    amounts: [140]
  gold_answer: >
    The emergency room copay is $140. If you are admitted to the same hospital
    within 24 hours for the same condition, you do not pay your share of the
    emergency-care cost.

- id: pcp-copay
  doc: humana-gold-plus-h1036-217
  question: "What do I pay to see my primary care doctor?"
  answerable: true
  expect_facts:
    amounts: [0]
  gold_answer: "You pay a $0 copay to see your primary care provider (PCP)."

- id: specialist-copay
  doc: humana-gold-plus-h1036-217
  question: "How much is a specialist visit?"
  answerable: true
  expect_facts:
    amounts: [10]
  gold_answer: "A specialist office visit is a $10 copay."

- id: inpatient-per-day
  doc: humana-gold-plus-h1036-217
  question: "What do I pay per day for an inpatient hospital stay?"
  answerable: true
  expect_facts:
    amounts: [175]
  gold_answer: "You pay $175 per day for days 1 through 5, then $0 per day for days 6 through 90."

- id: urgent-care-copay
  doc: humana-gold-plus-h1036-217
  question: "What's the copay at an urgent care center?"
  answerable: true
